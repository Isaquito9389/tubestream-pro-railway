<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Erreur Serveur | TubeStream Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #09090b;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-page { padding: 40px; }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        h1 { font-size: 28px; margin: 16px 0 8px; }
        p { color: #a1a1aa; font-size: 16px; margin-bottom: 32px; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #8b5cf6;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn:hover { background: #7c3aed; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">500</div>
        <h1>Erreur serveur</h1>
        <p>Une erreur inattendue s'est produite. Veuillez réessayer dans quelques instants.</p>
        <a href="/" class="btn">Retour à l'accueil</a>
    </div>
</body>
</html>
