# ============================================================
# Nixpacks (utilisé par Render et fallback Railway sans Dockerfile)
# Module Flask : `app` (fichier app.py)
# On délègue aussi à start.sh pour éviter que nixpacks ne voie $PORT.
# ============================================================
[phases.setup]
nixPkgs = ["python311", "ffmpeg", "glibcLocales"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["chmod +x /app/start.sh"]

[start]
cmd = "/app/start.sh"
